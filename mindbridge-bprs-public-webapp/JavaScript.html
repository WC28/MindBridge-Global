  function initializePortal() {

  function hydrateBootstrap() {
    if (!isAppsScriptRuntime()) {
      renderApp();
      return;
    }

    runServer('getPublicBootstrap', [], function(payload) {
      state.bootstrap = mergeBootstrap(payload);
      renderApp();
    }, function() {
      state.bootstrap = LOCAL_BOOTSTRAP;
      renderApp();
      showBanner('Loaded local presentation mode because the live bootstrap was unavailable.');
    });
  }

  function mergeBootstrap(payload) {
    if (!payload) {
      return LOCAL_BOOTSTRAP;
    }
    return {
      appTitle: payload.appTitle || LOCAL_BOOTSTRAP.appTitle,
      subtitle: payload.subtitle || LOCAL_BOOTSTRAP.subtitle,
      spreadsheetUrl: payload.spreadsheetUrl || '',
      dashboardUrl: payload.dashboardUrl || '',
      unifiedIntakeUrl: payload.unifiedIntakeUrl || '',
      workflowPhases: payload.workflowPhases || LOCAL_BOOTSTRAP.workflowPhases,
      interpretationBands: payload.interpretationBands || LOCAL_BOOTSTRAP.interpretationBands,
      scale: LOCAL_BOOTSTRAP.scale.map(function(localScale) {
        const serverScale = (payload.scale || []).find(function(item) {
          return Number(item.value) === Number(localScale.value);
        }) || {};
        return Object.assign({}, localScale, serverScale);
      }),
      items: LOCAL_BOOTSTRAP.items.map(function(localItem) {
        const serverItem = (payload.items || []).find(function(item) {
          return item.id === localItem.id;
        }) || {};
        return Object.assign({}, localItem, {
          title: serverItem.title || localItem.title,
          number: serverItem.number || localItem.number
        });
      })
    };
  }

  function getResponses() {
    const responses = {};
    state.bootstrap.items.forEach(function(item) {

  function computeLocalScoring() {
    const responses = getResponses();
    const completed = Object.keys(responses).filter(function(key) {
      return responses[key] >= 1;
    }).length;
    const baseScore = state.bootstrap.items.length;
    const totalScore = completed
      ? state.bootstrap.items.reduce(function(sum, item) {
          return sum + (responses[item.id] || 1);
        }, 0)
      : baseScore;
    const immediateSafety = document.getElementById('immediate-safety').checked;

    let interpretation = 'Minimal to mild symptoms';
    if (totalScore > 60) {
      interpretation = 'Very severe psychiatric symptom burden';
    } else if (totalScore > 40) {
      interpretation = 'Moderate to severe psychopathology';
    } else if (totalScore > 30) {
      interpretation = 'Mild to moderate clinical significance';
    }

    const highConcernIds = [
      'hallucinatory_behavior',
      'unusual_thought_content',
      'disorientation',
      'hostility',
      'excitement',
      'conceptual_disorganization'
    ];
    const hasCriticalItem = highConcernIds.some(function(id) {
      return responses[id] >= 6;
    });
    const hasUrgentItem = highConcernIds.some(function(id) {
      return responses[id] >= 5;
    });
    const psychosisLoad = sumSelectedResponses_(responses, [
      'suspiciousness',
      'hallucinatory_behavior',
      'unusual_thought_content',
      'disorientation',
      'conceptual_disorganization',
      'grandiosity'
    ]);
    const moodDistressLoad = sumSelectedResponses_(responses, [
      'anxiety',
      'depressive_mood',
      'guilt_feelings',
      'tension',
      'emotional_withdrawal',
      'blunted_affect'
    ]);
    const activationLoad = sumSelectedResponses_(responses, [
      'hostility',
      'excitement',
      'mannerisms_posturing',
      'motor_retardation',
      'uncooperativeness'
    ]);

    let urgencyLabel = 'Stable support pathway';
    let urgencyTone = 'stable';
    let routeDestination = 'Community support or routine clinic';
    let routeTiming = 'Routine follow-up';
    let routeTeam = 'Patient, family, caregiver, or community support link';
    let aiScreeningSummary = '';
    let aiTriageSummary = '';
    let workflowStageKey = 'community';
    let workflowStageLabel = 'Community monitoring';
    let workflowStageDescription = 'Low-risk cases stay visible for community or family follow-up and self-help support.';
    let mdtRecommended = false;
    let communityRecommended = true;
    let appointmentRecommended = false;
    let nextStep = 'Complete the full form and share the summary during a clinical conversation or follow-up check-in.';
    let workflowSummary = 'Front door access completed. Continue with routine follow-up, psychoeducation, and community support if needed.';
    const dominantConcern = buildDominantConcernLabel_(psychosisLoad, moodDistressLoad, activationLoad);

    if (immediateSafety) {
      urgencyLabel = 'Emergency attention now';
      urgencyTone = 'critical';
      routeDestination = 'Emergency services';
      routeTiming = 'Now';
      routeTeam = 'Emergency team and psychiatric crisis response';
      workflowStageKey = 'emergency';
      workflowStageLabel = 'Emergency now';
      workflowStageDescription = 'Immediate safety concern. Alert psychiatrist, activate emergency routing, and prepare MDT support after stabilization.';
      mdtRecommended = true;
      communityRecommended = false;
      appointmentRecommended = true;
      aiScreeningSummary = 'AI-assisted screening detected an immediate safety concern from intake and symptom review, with the strongest pattern in ' + dominantConcern + '.';
      aiTriageSummary = 'AI-assisted triage recommends immediate emergency routing and psychiatric crisis response without waiting for a routine appointment.';
      nextStep = 'Do not wait. Use local emergency services or go to the nearest emergency department now.';
      workflowSummary = 'Front door access detected immediate safety concern. Escalate directly to emergency services and psychiatric crisis response.';
    } else if (totalScore > 60 || hasCriticalItem) {
      urgencyLabel = 'Immediate clinical review';
      urgencyTone = 'critical';
      routeDestination = psychosisLoad >= moodDistressLoad ? 'Psychiatrist / emergency psychiatric review' : 'Psychiatrist and high-priority psychological review';
      routeTiming = 'Immediate same-day review';
      routeTeam = 'Psychiatrist, nurse, and crisis-capable mental health team';
      workflowStageKey = 'psychiatrist';
      workflowStageLabel = 'Psychiatrist review';
      workflowStageDescription = 'Very high-risk case. Notify psychiatrist now, arrange same-day review, and allow psychiatrist to pull in MDT support.';
      mdtRecommended = true;
      communityRecommended = false;
      appointmentRecommended = true;
      aiScreeningSummary = 'AI-assisted screening detected very high symptom burden or critical psychiatric signals, with the strongest pattern in ' + dominantConcern + '.';
      aiTriageSummary = 'AI-assisted triage recommends immediate same-day specialist review with crisis-capable psychiatric support.';
      nextStep = 'Escalate for urgent same-day mental health review and direct safety assessment.';
      workflowSummary = 'Front door assessment shows very high symptom burden or critical symptom signals. Move directly to urgent mental health review and same-day safety assessment.';
    } else if (totalScore > 40 || hasUrgentItem) {
      urgencyLabel = 'Priority same-day review';
      urgencyTone = 'urgent';
      routeDestination = psychosisLoad + activationLoad >= moodDistressLoad
        ? 'Psychiatrist'
        : 'Psychologist or psychiatrist';
      routeTiming = 'Priority review today';
      routeTeam = 'Mental health intake team with multidisciplinary backup';
      workflowStageKey = 'psychiatrist';
      workflowStageLabel = 'Psychiatrist review';
      workflowStageDescription = 'New high-priority case. Notify psychiatrist, arrange early appointment, and keep MDT backup ready.';
      mdtRecommended = true;
      communityRecommended = true;
      appointmentRecommended = true;
      aiScreeningSummary = 'AI-assisted screening detected moderate to severe psychopathology or urgent psychiatric signals, with the strongest pattern in ' + dominantConcern + '.';
      aiTriageSummary = 'AI-assisted triage recommends priority same-day mental health review and psychiatrist notification if needed.';
      nextStep = 'Arrange prompt psychiatric or psychological review as soon as safely possible.';
      workflowSummary = 'Front door assessment shows moderate to severe psychopathology or urgent symptom signals. Route to priority same-day specialist review.';
    } else if (totalScore >= 31) {
      urgencyLabel = 'Watch closely and follow up';
      urgencyTone = 'watch';
      routeDestination = moodDistressLoad >= psychosisLoad ? 'Psychologist / primary mental health clinic' : 'GP or psychiatrist for follow-up review';
      routeTiming = 'Within 24 to 72 hours';
      routeTeam = 'Outpatient mental health team, GP, or structured follow-up service';
      workflowStageKey = 'mdt';
      workflowStageLabel = 'MDT coordination';
      workflowStageDescription = 'Moderate-risk case. Arrange follow-up, allow psychiatrist or psychologist to consult MDT, and consider community monitoring.';
      mdtRecommended = true;
      communityRecommended = true;
      appointmentRecommended = true;
      aiScreeningSummary = 'AI-assisted screening detected clinically significant symptoms, with the strongest pattern in ' + dominantConcern + '.';
      aiTriageSummary = 'AI-assisted triage recommends structured follow-up within 24 to 72 hours with the most appropriate mental health service.';
      nextStep = 'Share with the care team and arrange follow-up with the appropriate professional service.';
      workflowSummary = 'Front door assessment shows clinically significant symptoms. Route to structured follow-up and the most appropriate professional team.';
    } else {
      aiScreeningSummary = 'AI-assisted screening detected lower symptom burden overall, while the most noticeable pattern remains in ' + dominantConcern + '.';
      aiTriageSummary = 'AI-assisted triage recommends routine follow-up, psychoeducation, and community support unless symptoms escalate.';
    }

    const topSignals = state.bootstrap.items
      .map(function(item) {
        return {
          title: item.title,
          value: responses[item.id]
        };
      })
      .sort(function(left, right) {
        return right.value - left.value;
      })
      .slice(0, 3)
      .filter(function(item) {
        return item.value >= 4;
      });

    return {
      completed: completed,
      totalScore: totalScore,
      interpretation: interpretation,
      urgencyLabel: urgencyLabel,
      urgencyTone: urgencyTone,
      routeDestination: routeDestination,
      routeTiming: routeTiming,
      routeTeam: routeTeam,
      aiScreeningSummary: aiScreeningSummary,
      aiTriageSummary: aiTriageSummary,
      workflowStageKey: workflowStageKey,
      workflowStageLabel: workflowStageLabel,
      workflowStageDescription: workflowStageDescription,
      mdtRecommended: mdtRecommended,
      communityRecommended: communityRecommended,
      appointmentRecommended: appointmentRecommended,
      nextStep: nextStep,
      workflowSummary: workflowSummary,
      notificationPreview: buildNotificationPreview_(totalScore, immediateSafety),
      topSignals: topSignals,
      responses: responses
    };
  }

  function syncSummary() {
    const summary = computeLocalScoring();
    document.getElementById('completed-items').textContent = summary.completed + ' / 18';
    document.getElementById('total-score').textContent = String(summary.totalScore);
    document.getElementById('hero-score').textContent = String(summary.totalScore);
    document.getElementById('interpretation-text').textContent = summary.interpretation;
    document.getElementById('hero-band').textContent = summary.interpretation;
    document.getElementById('next-step-text').textContent = summary.nextStep;
    document.getElementById('hero-next-step').textContent = summary.nextStep;
    document.getElementById('route-destination').textContent = summary.routeDestination;
    document.getElementById('route-timing').textContent = summary.routeTiming;
    document.getElementById('route-team').textContent = summary.routeTeam;
    document.getElementById('workflow-stage-label').textContent = summary.workflowStageLabel;
    document.getElementById('workflow-stage-copy').textContent = summary.workflowStageDescription;
    document.getElementById('ai-screening-summary').textContent = summary.aiScreeningSummary;
    document.getElementById('ai-triage-summary').textContent = summary.aiTriageSummary;
    document.getElementById('workflow-summary').textContent = summary.workflowSummary;
    applyPsychiatristAlertCard(summary.notificationPreview);

    const urgencyBadge = document.getElementById('urgency-badge');
    const heroBand = document.getElementById('hero-band');
    urgencyBadge.className = 'urgency-chip urgency-' + summary.urgencyTone;
    urgencyBadge.textContent = summary.urgencyLabel;
    heroBand.className = 'hero-band urgency-' + summary.urgencyTone;

    document.getElementById('top-signals').innerHTML = summary.topSignals.length
      ? summary.topSignals.map(function(item) {
          return '<div class="signal-chip">' + escapeHtml(item.title + ' (' + item.value + '/7)') + '</div>';
        }).join('')
      : '<div class="empty-line">No high-signal items yet.</div>';
  }

  function buildNotificationPreview_(totalScore, immediateSafety) {
    const triggered = totalScore > PSYCHIATRIST_ALERT_THRESHOLD || immediateSafety;
    if (!triggered) {
      return {
        triggered: false,
        title: 'Not triggered',
        tone: 'alert-state-idle',
        copy: 'A psychiatrist warning is prepared only when the total score is above ' + PSYCHIATRIST_ALERT_THRESHOLD + ' or immediate safety is marked.'
      };
    }

    if (state.bootstrap.unifiedIntakeUrl) {
      return {
        triggered: true,
        title: 'Continue to Unified Intake',
        tone: 'alert-state-preview',
        copy: immediateSafety
          ? 'Immediate safety is marked. Continue to Unified Intake, review the imported fields, and save there so the staff triage queue and psychiatrist workflow can be triggered.'
          : 'This score is above ' + PSYCHIATRIST_ALERT_THRESHOLD + '. Continue to Unified Intake and save there before the staff Telegram alert is sent.'
      };
    }

    return {
      triggered: true,
      title: 'Will warn psychiatrist on save',
      tone: 'alert-state-preview',
      copy: immediateSafety
        ? 'Immediate safety is marked, so saving this form should warn the psychiatrist or crisis team right away.'
        : 'This new submission is above ' + PSYCHIATRIST_ALERT_THRESHOLD + ', so saving the form should warn the psychiatrist team through Telegram.'
    };
  }

  function describeServerNotification_(result) {
    const status = String(result && result.notificationStatus ? result.notificationStatus : '');
    const response = String(result && result.notificationResponse ? result.notificationResponse : '').trim();

    if (!result || !result.notificationTriggered) {
      return {
        title: 'Not triggered',
        tone: 'alert-state-idle',
        copy: response || 'No psychiatrist alert was needed for this submission.'
      };
    }

    if (status === 'Sent') {
      return {
        title: 'Psychiatrist warned',
        tone: 'alert-state-sent',
        copy: response || 'Telegram alert sent to the psychiatrist team.'
      };
    }

    if (status === 'Unified Intake pending') {
      return {
        title: 'Awaiting Unified Intake save',
        tone: 'alert-state-preview',
        copy: response || 'This high-priority screening must be reviewed and saved through Unified Intake before Telegram alert delivery.'
      };
    }

    if (status === 'Disabled' || status === 'Config missing') {
      return {
        title: 'Alert ready but not delivered',
        tone: 'alert-state-disabled',
        copy: response || 'The submission crossed the alert threshold, but Telegram delivery is not configured yet.'
      };
    }

    return {
      title: 'Alert delivery problem',
      tone: 'alert-state-failed',
      copy: response || 'The psychiatrist alert should have been sent, but delivery failed.'
    };
  }

  function applyPsychiatristAlertCard(view) {
    const card = document.getElementById('psychiatrist-alert-card');
    const title = document.getElementById('psychiatrist-alert-title');
    const copy = document.getElementById('psychiatrist-alert-copy');

    card.className = 'alert-status-card ' + view.tone;
    title.textContent = view.title;
    copy.textContent = view.copy;
  }

  function bindGlobalActions() {
    document.getElementById('submit-button').addEventListener('click', submitAssessment);
    document.getElementById('copy-button').addEventListener('click', copySummary);
    document.getElementById('print-button').addEventListener('click', function() {
      window.print();
    });
    document.getElementById('reset-button').addEventListener('click', resetForm);
  }

  function submitAssessment() {
    const payload = buildPayload();
    const localSummary = computeLocalScoring();

    if (localSummary.completed !== 18) {
      showBanner('Please complete all 18 BPRS items before generating the summary.', true);
      return;
    }

    showBanner(isAppsScriptRuntime() ? 'Saving BPRS assessment...' : 'Generating presentation summary...');

    if (!isAppsScriptRuntime()) {
      renderResult({
        saved: false,
        submissionMode: 'local_demo',
        referenceCode: 'LOCAL-DEMO',
        totalScore: localSummary.totalScore,
        interpretation: localSummary.interpretation,
        urgencyLabel: localSummary.urgencyLabel,
        urgencyTone: localSummary.urgencyTone,
        routeDestination: localSummary.routeDestination,
        routeTiming: localSummary.routeTiming,
        routeTeam: localSummary.routeTeam,
        aiScreeningSummary: localSummary.aiScreeningSummary,
        aiTriageSummary: localSummary.aiTriageSummary,
        workflowStageKey: localSummary.workflowStageKey,
        workflowStageLabel: localSummary.workflowStageLabel,
        workflowStageDescription: localSummary.workflowStageDescription,
        mdtRecommended: localSummary.mdtRecommended,
        communityRecommended: localSummary.communityRecommended,
        appointmentRecommended: localSummary.appointmentRecommended,
        nextStep: localSummary.nextStep,
        workflowSummary: localSummary.workflowSummary,
        notificationStatus: localSummary.notificationPreview.triggered ? 'Preview only' : 'Not triggered',
        notificationResponse: localSummary.notificationPreview.copy,
        notificationTriggered: localSummary.notificationPreview.triggered,
        topSignals: localSummary.topSignals.map(function(item) {
          return item.title + ' (' + item.value + '/7)';
        }),
        summaryText: buildShareSummary(localSummary)
      });
      showBanner('Presentation summary generated. This static mode does not save to Google Sheets.');
      return;
    }

    runServer('saveAssessment', [payload], function(result) {
      renderResult(result);
      showBanner(state.bootstrap.unifiedIntakeUrl
        ? 'Assessment saved. Continue to Unified Intake to complete the shared triage flow.'
        : 'Assessment saved and summary generated.');
    }, function(error) {
      showBanner(error.message || 'Unable to save the assessment.', true);
    });
  }

  function buildPayload() {
    return {
      respondentRole: state.respondentRole,
      completionContext: state.completionContext,
      preferredLanguage: state.language,
      respondentName: document.getElementById('respondent-name').value,
      patientCode: document.getElementById('patient-code').value,
      caregiverName: document.getElementById('caregiver-name').value,
      immediateSafety: document.getElementById('immediate-safety').checked,
      notes: document.getElementById('notes').value,
      responses: getResponses()
    };
  }

  function sumSelectedResponses_(responses, ids) {
    return ids.reduce(function(sum, id) {
      return sum + Number(responses[id] || 0);
    }, 0);
  }

  function buildDominantConcernLabel_(psychosisLoad, moodDistressLoad, activationLoad) {
    if (psychosisLoad >= moodDistressLoad && psychosisLoad >= activationLoad) {
      return 'thinking and perception symptoms';
    }
    if (moodDistressLoad >= psychosisLoad && moodDistressLoad >= activationLoad) {
      return 'mood and emotional distress symptoms';
    }
    return 'behavioral activation or slowing symptoms';
  }

  function renderResult(result) {
    const notificationView = result.submissionMode === 'apps_script'
      ? describeServerNotification_(result)
      : {
          title: result.notificationTriggered ? 'Will warn psychiatrist on save' : 'Not triggered',
          tone: result.notificationTriggered ? 'alert-state-preview' : 'alert-state-idle',
          copy: result.notificationResponse || 'Local presentation mode does not send Telegram alerts.'
        };

    applyPsychiatristAlertCard(notificationView);

    const unifiedIntakeHref = buildUnifiedIntakeHref_(result);
    const box = document.getElementById('result-box');
    box.innerHTML = [
      '<strong>',
      escapeHtml(result.referenceCode || 'BPRS summary ready'),
      '</strong>',
      '<div class="result-meta">',
      '<span class="mini-chip">Score: ',
      escapeHtml(String(result.totalScore)),
      '</span>',
      '<span class="mini-chip">Interpretation: ',
      escapeHtml(result.interpretation),
      '</span>',
      '<span class="mini-chip">Urgency: ',
      escapeHtml(result.urgencyLabel),
      '</span>',
      result.workflowStageLabel ? '<span class="mini-chip">Stage: ' + escapeHtml(result.workflowStageLabel) + '</span>' : '',
      result.routeDestination ? '<span class="mini-chip">Route: ' + escapeHtml(result.routeDestination) + '</span>' : '',
      result.routeTiming ? '<span class="mini-chip">Timing: ' + escapeHtml(result.routeTiming) + '</span>' : '',
      '<span class="mini-chip ' + escapeHtml(notificationView.tone) + '">Psychiatrist alert: ' + escapeHtml(notificationView.title) + '</span>',
      result.submissionMode === 'apps_script' ? '<span class="mini-chip">Saved to Google Sheet</span>' : '<span class="mini-chip">Local presentation mode</span>',
      '</div>',
      '<div>',
      escapeHtml(result.nextStep || ''),
      '</div>',
      result.routeTeam
        ? '<div><strong>Suggested team:</strong> ' + escapeHtml(result.routeTeam) + '</div>'
        : '',
      result.workflowStageDescription
        ? '<div><strong>Workflow stage:</strong> ' + escapeHtml(result.workflowStageDescription) + '</div>'
        : '',
      result.aiScreeningSummary
        ? '<div><strong>AI screening:</strong> ' + escapeHtml(result.aiScreeningSummary) + '</div>'
        : '',
      result.aiTriageSummary
        ? '<div><strong>AI triage:</strong> ' + escapeHtml(result.aiTriageSummary) + '</div>'
        : '',
      result.workflowSummary
        ? '<div>' + escapeHtml(result.workflowSummary) + '</div>'
        : '',
      notificationView.copy
        ? '<div class="result-note"><strong>Alert status:</strong> ' + escapeHtml(notificationView.copy) + '</div>'
        : '',
      result.topSignals && result.topSignals.length
        ? '<div><strong>Top signals:</strong> ' + escapeHtml(result.topSignals.join(', ')) + '</div>'
        : '',
      result.summaryText
        ? '<div>' + escapeHtml(result.summaryText) + '</div>'
        : '',
      unifiedIntakeHref
        ? '<div class="staff-link-card"><div class="subsection-label">Next step in shared workflow</div><a id="unified-intake-link" class="dashboard-link-button" href="' + escapeHtml(unifiedIntakeHref) + '">Continue to Unified Intake</a><div class="staff-link-copy">Open the connected Unified Intake form with BPRS score, language, risk context, and summary prefilled before staff review and Telegram alert routing.</div></div>'
        : '',
      result.spreadsheetUrl
        ? '<div><a href="' + escapeHtml(result.spreadsheetUrl) + '" target="_blank" rel="noopener">Open Google Sheet</a></div>'
        : '',
      result.dashboardUrl
        ? '<div><a href="' + escapeHtml(result.dashboardUrl) + '" target="_blank" rel="noopener">Open psychiatrist / MDT dashboard</a></div>'
        : ''
    ].join('');
    box.classList.remove('hidden');

    const unifiedLink = document.getElementById('unified-intake-link');
    if (unifiedLink) {
      unifiedLink.addEventListener('click', function() {
        persistUnifiedIntakeHandoff_(buildUnifiedIntakeHandoff_(result));
      });
    }
  }

  function copySummary() {
    const summary = buildShareSummary(computeLocalScoring());
    navigator.clipboard.writeText(summary).then(function() {
      showBanner('Summary copied to clipboard.');
    }, function() {
      showBanner('Unable to copy automatically. You can still copy the result from the summary panel.', true);
    });
  }

  function buildShareSummary(summary) {
    const lines = [
      'MindBridge BPRS Access',
      'Role: ' + state.respondentRole,
      'Setting: ' + state.completionContext,
      'BPRS total score: ' + summary.totalScore,
      'Interpretation: ' + summary.interpretation,
      'Urgency: ' + summary.urgencyLabel,
      'Workflow stage: ' + summary.workflowStageLabel,
      'AI screening: ' + summary.aiScreeningSummary,
      'AI triage: ' + summary.aiTriageSummary,
      'Route: ' + summary.routeDestination,
      'Timing: ' + summary.routeTiming,
      'Suggested team: ' + summary.routeTeam,
      'Next step: ' + summary.nextStep
    ];

    if (summary.topSignals.length) {
      lines.push('Top signals: ' + summary.topSignals.map(function(item) {
        return item.title + ' (' + item.value + '/7)';
      }).join(', '));
    }

    lines.push('This result should support, not replace, clinical judgment.');
    return lines.join('\n');
  }

  function buildUnifiedIntakeHandoff_(result) {
    const payload = buildPayload();
    const summary = computeLocalScoring();
    const topSignals = (result.topSignals || summary.topSignals || []).map(function(item) {
      if (typeof item === 'string') {
        return item;
      }
      return item.title + ' (' + item.value + '/7)';
    });

    return {
      source: 'mindbridge_bprs',
      referenceCode: result.referenceCode || '',
      respondentRole: state.respondentRole,
      completionContext: state.completionContext,
      preferredLanguage: state.language,
      respondentName: payload.respondentName || '',
      patientCode: payload.patientCode || '',
      caregiverName: payload.caregiverName || '',
      immediateSafety: payload.immediateSafety ? 'Yes' : 'No',
      totalScore: Number(result.totalScore || summary.totalScore || 0),
      interpretation: result.interpretation || summary.interpretation || '',
      urgencyLabel: result.urgencyLabel || summary.urgencyLabel || '',
      urgencyTone: result.urgencyTone || summary.urgencyTone || '',
      workflowStageKey: result.workflowStageKey || summary.workflowStageKey || '',
      workflowStageLabel: result.workflowStageLabel || summary.workflowStageLabel || '',
      routeDestination: result.routeDestination || summary.routeDestination || '',
      routeTiming: result.routeTiming || summary.routeTiming || '',
      routeTeam: result.routeTeam || summary.routeTeam || '',
      topSignals: topSignals.slice(0, 3),
      notes: truncateText_(payload.notes || '', 280),
      aiScreeningSummary: truncateText_(result.aiScreeningSummary || summary.aiScreeningSummary || '', 180),
      aiTriageSummary: truncateText_(result.aiTriageSummary || summary.aiTriageSummary || '', 180),
      workflowSummary: truncateText_(result.workflowSummary || summary.workflowSummary || '', 180),
      summaryText: truncateText_(result.summaryText || buildShareSummary(summary), 320),
      submittedAt: new Date().toISOString()
    };
  }

  function buildUnifiedIntakeHref_(result) {
    const baseUrl = result.unifiedIntakeUrl || state.bootstrap.unifiedIntakeUrl;
    if (!baseUrl) {
      return '';
    }

    const handoff = buildUnifiedIntakeHandoff_(result);
    const encoded = encodeBase64Url_(JSON.stringify(handoff));
    const url = new URL(baseUrl, window.location.href);
    url.searchParams.set('portal', 'screening');
    url.searchParams.set('handoff', '1');
    url.searchParams.set('handoffPayload', encoded);
    return url.toString();
  }

  function persistUnifiedIntakeHandoff_(handoff) {
    try {
      window.localStorage.setItem('mindbridge-unified-intake-handoff-v1', JSON.stringify(handoff || {}));
    } catch (error) {}
  }

  function encodeBase64Url_(text) {
    const encoded = window.btoa(encodeURIComponent(String(text || '')).replace(/%([0-9A-F]{2})/g, function(match, hex) {
      return String.fromCharCode(parseInt(hex, 16));
    }));
    return encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
  }

  function truncateText_(value, maxLength) {
    const text = String(value === undefined || value === null ? '' : value).trim();
    if (!maxLength || text.length <= maxLength) {
      return text;
    }
    return text.slice(0, Math.max(0, maxLength - 3)) + '...';
  }

  function resetForm() {
    document.getElementById('bprs-form').reset();
    document.getElementById('result-box').classList.add('hidden');
    document.getElementById('result-box').innerHTML = '';
    syncSummary();
    showBanner('Form reset.');
  }

  function getLocalizedText(option, prefix) {
    const suffix = getLanguageSuffix_();
    return option[prefix + suffix] || option[prefix + 'En'] || option[prefix] || '';
  }

  function getLanguageSuffix_() {
    if (state.language === 'th') {
      return 'Th';
    }
    if (state.language === 'zh') {
      return 'Zh';
    }
    if (state.language === 'hi') {
      return 'Hi';
    }
    if (state.language === 'ur') {
      return 'Ur';
    }
    return 'En';
  }

  function isAppsScriptRuntime() {
    return typeof google !== 'undefined' &&
      google.script &&
      google.script.run;
  }

  function runServer(functionName, args, onSuccess, onFailure) {
    if (!isAppsScriptRuntime()) {
      onFailure(new Error('Apps Script runtime is not available.'));
      return;
    }
    const runner = google.script.run
      .withSuccessHandler(onSuccess)
      .withFailureHandler(function(error) {
        onFailure(error || new Error('Unknown server error.'));
      });
    runner[functionName](...(args || []));
  }

  function showBanner(message, isError) {
    const banner = document.getElementById('banner');
    banner.textContent = message;
    banner.classList.remove('hidden');
    banner.classList.toggle('error', !!isError);
  }

  function escapeHtml(value) {
    return String(value === undefined || value === null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  document.addEventListener('DOMContentLoaded', initializePortal);
</script>
