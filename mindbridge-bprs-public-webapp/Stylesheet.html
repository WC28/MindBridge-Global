<style>
  :root {
    --bg: #f7f1e7;
    --panel: rgba(255, 252, 247, 0.88);
    --panel-strong: #fffdf9;
    --text: #163038;
    --muted: #5a7076;
    --border: rgba(22, 48, 56, 0.1);
    --accent: #0e8e8a;
    --accent-strong: #146e8b;
    --accent-soft: rgba(14, 142, 138, 0.1);
    --sand: #f0e1c8;
    --critical-bg: #ffe6ea;
    --critical-text: #a52d51;
    --urgent-bg: #fff0d4;
    --urgent-text: #9b6206;
    --watch-bg: #fff7cf;
    --watch-text: #7b6614;
    --stable-bg: #e6f6ef;
    --stable-text: #1b7c60;
    --info-bg: #e8f4ff;
    --info-text: #1d5d90;
    --shadow: 0 24px 64px rgba(39, 54, 63, 0.1);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at top left, rgba(20, 110, 139, 0.12), transparent 32%),
      radial-gradient(circle at bottom right, rgba(14, 142, 138, 0.16), transparent 28%),
      linear-gradient(180deg, #faf5ec 0%, #f4ede0 100%);
    color: var(--text);
    font-family: 'Avenir Next', 'Segoe UI', sans-serif;
  }

  body {
    position: relative;
    padding: 32px 24px 48px;
  }

  .ambient-orb {
    position: fixed;
    border-radius: 999px;
    filter: blur(14px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
  }

  .ambient-orb-a {
    width: 240px;
    height: 240px;
    background: rgba(14, 142, 138, 0.18);
    top: 18px;
    right: 6%;
  }

  .ambient-orb-b {
    width: 180px;
    height: 180px;
    background: rgba(196, 122, 59, 0.18);
    bottom: 40px;
    left: 4%;
  }

  .hero-shell,
  .layout-shell {
    position: relative;
    z-index: 1;
  }

  .hero-shell {
    display: grid;
    grid-template-columns: minmax(0, 1.5fr) minmax(280px, 360px);
    gap: 20px;
    align-items: stretch;
    margin: 0 auto 24px;
    max-width: 1380px;
  }

  .hero-copy,
  .hero-panel,
  .panel {
    border: 1px solid var(--border);
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }

  .hero-copy,
  .hero-panel {
    border-radius: 28px;
    padding: 28px;
  }

  .eyebrow,
  .selector-label,
  .subsection-label,
  .hero-panel-label {
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  h1,
  h2,
  h3 {
    margin: 0;
    font-family: 'Iowan Old Style', 'Georgia', serif;
    letter-spacing: -0.02em;
  }

  h1 {
    font-size: clamp(42px, 5vw, 66px);
    line-height: 0.98;
    margin-top: 10px;
  }

  h2 {
    font-size: 28px;
    margin-bottom: 8px;
  }

  p {
    margin: 0;
    color: var(--muted);
    line-height: 1.65;
  }

  .hero-note {
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(14, 142, 138, 0.12), rgba(20, 110, 139, 0.08));
    border: 1px solid rgba(14, 142, 138, 0.14);
    line-height: 1.6;
  }

  .hero-score {
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    margin-top: 10px;
  }

  .hero-band,
  .urgency-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid transparent;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }

  .hero-next-step {
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    line-height: 1.6;
    color: var(--text);
  }

  .layout-shell {
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(320px, 420px);
    gap: 20px;
    margin: 0 auto;
    max-width: 1380px;
    align-items: start;
  }

  .form-column,
  .summary-column,
  .form-stack,
  .groups-stack {
    display: grid;
    gap: 18px;
  }

  .panel {
    border-radius: 24px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .hero-rainbow::before,
  .hero-lilac::before,
  .panel-tone-sunset::before,
  .panel-tone-rose::before,
  .panel-tone-sky::before,
  .panel-tone-mint::before,
  .panel-tone-lemon::before {
    content: '';
    position: absolute;
    inset: 0 0 auto 0;
    height: 7px;
    border-radius: 28px 28px 0 0;
  }

  .hero-rainbow::before,
  .panel-tone-sunset::before {
    background: linear-gradient(90deg, #ff8c5a, #ffc36b, #ff8fc5);
  }

  .hero-lilac::before,
  .panel-tone-rose::before {
    background: linear-gradient(90deg, #ff7c88, #ff9cc8, #b28cff);
  }

  .panel-tone-sky::before {
    background: linear-gradient(90deg, #5d8dff, #53d1ff, #7ef0c8);
  }

  .panel-tone-mint::before {
    background: linear-gradient(90deg, #55d8c1, #7de091, #c3ef74);
  }

  .panel-tone-lemon::before {
    background: linear-gradient(90deg, #b9e94b, #ffe37d, #7be0f7);
  }

  .panel-intro {
    background:
      linear-gradient(180deg, rgba(255, 252, 247, 0.96), rgba(255, 248, 236, 0.94)),
      var(--panel);
  }

  .panel-header {
    display: grid;
    gap: 6px;
    margin-bottom: 18px;
  }

  .selector-block {
    display: grid;
    gap: 10px;
  }

  .workflow-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 10px;
    margin-bottom: 6px;
  }

  .workflow-step {
    border-radius: 18px;
    border: 1px solid rgba(22, 48, 56, 0.08);
    background: rgba(255, 255, 255, 0.82);
    padding: 14px;
    display: grid;
    gap: 8px;
  }

  .workflow-step strong {
    font-size: 14px;
  }

  .workflow-step span {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .selector-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
  }

  .selector-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .selector-card,
  .language-pill {
    appearance: none;
    border: 1px solid var(--border);
    background: #fffaf2;
    color: var(--text);
    border-radius: 18px;
    padding: 14px 16px;
    font: inherit;
    text-align: left;
    cursor: pointer;
    transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
  }

  .selector-card:hover,
  .language-pill:hover,
  .primary-button:hover,
  .ghost-button:hover {
    transform: translateY(-1px);
  }

  .selector-card.active,
  .language-pill.active {
    border-color: rgba(14, 142, 138, 0.42);
    background: linear-gradient(135deg, rgba(14, 142, 138, 0.12), rgba(20, 110, 139, 0.08));
    box-shadow: 0 12px 24px rgba(20, 110, 139, 0.1);
  }

  .selector-card strong,
  .language-pill strong {
    display: block;
    margin-bottom: 4px;
  }

  .selector-card small,
  .language-pill small {
    color: var(--muted);
    line-height: 1.45;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .field {
    display: grid;
    gap: 8px;
  }

  .field.span-2 {
    grid-column: span 2;
  }

  label {
    font-size: 14px;
    font-weight: 700;
  }

  input[type='text'],
  textarea {
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(22, 48, 56, 0.12);
    background: rgba(255, 255, 255, 0.86);
    padding: 14px 16px;
    color: var(--text);
    font: inherit;
  }

  textarea {
    min-height: 112px;
    resize: vertical;
  }

  input:focus,
  textarea:focus {
    outline: 2px solid rgba(14, 142, 138, 0.18);
    border-color: rgba(14, 142, 138, 0.4);
  }

  .field-checkbox {
    align-self: stretch;
  }

  .checkbox-card {
    display: grid;
    grid-template-columns: 20px minmax(0, 1fr);
    gap: 12px;
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid rgba(22, 48, 56, 0.12);
    background: rgba(255, 255, 255, 0.82);
    cursor: pointer;
  }

  .checkbox-card small {
    display: block;
    margin-top: 4px;
    line-height: 1.5;
    color: var(--muted);
  }

  .scale-legend {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 18px;
  }

  .scale-pill {
    border-radius: 16px;
    border: 1px solid var(--border);
    background: #fffaf2;
    padding: 10px 8px;
    text-align: center;
  }

  .scale-pill strong {
    display: block;
    font-size: 14px;
  }

  .scale-pill span {
    display: block;
    margin-top: 2px;
    font-size: 11px;
    color: var(--muted);
  }

  .group-card {
    border-radius: 22px;
    background: rgba(255, 253, 248, 0.94);
    border: 1px solid rgba(22, 48, 56, 0.08);
    padding: 18px;
    display: grid;
    gap: 14px;
  }

  .group-heading {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: end;
    border-bottom: 1px solid rgba(22, 48, 56, 0.08);
    padding-bottom: 12px;
  }

  .group-heading p {
    max-width: 620px;
  }

  .item-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .item-card {
    border-radius: 18px;
    background: #fffdf9;
    border: 1px solid rgba(22, 48, 56, 0.08);
    padding: 14px;
    display: grid;
    gap: 12px;
  }

  .item-meta {
    display: grid;
    gap: 4px;
  }

  .item-number {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .item-title {
    font-size: 18px;
    font-weight: 800;
  }

  .item-prompt {
    color: var(--text);
    line-height: 1.55;
  }

  .item-definition {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }

  .score-row {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 6px;
  }

  .score-option input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .score-option span {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    border: 1px solid rgba(22, 48, 56, 0.12);
    background: #fffaf2;
    min-height: 44px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
  }

  .score-option input:checked + span {
    background: linear-gradient(135deg, rgba(14, 142, 138, 0.18), rgba(20, 110, 139, 0.1));
    border-color: rgba(14, 142, 138, 0.4);
    color: var(--text);
  }

  .summary-column {
    position: sticky;
    top: 20px;
  }

  .summary-panel {
    display: grid;
    gap: 18px;
  }

  .summary-metric-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .summary-metric {
    border-radius: 18px;
    padding: 16px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.82);
    display: grid;
    gap: 6px;
  }

  .summary-metric span {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .summary-metric strong {
    font-size: 28px;
  }

  .interpretation-copy,
  .next-step-copy {
    line-height: 1.65;
  }

  .signal-stack,
  .bands-stack {
    display: grid;
    gap: 10px;
  }

  .signal-chip,
  .band-card {
    border-radius: 16px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.82);
    padding: 12px 14px;
  }

  .route-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .route-card {
    border-radius: 18px;
    padding: 14px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.82);
    display: grid;
    gap: 6px;
  }

  .route-card span {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .route-card strong {
    font-size: 18px;
    line-height: 1.45;
  }

  .route-card small {
    color: var(--muted);
    line-height: 1.55;
  }

  .route-card-wide {
    grid-column: span 2;
  }

  .workflow-summary-copy {
    line-height: 1.65;
    color: var(--text);
  }

  .alert-status-card {
    border-radius: 18px;
    padding: 16px;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.82);
    display: grid;
    gap: 8px;
  }

  .alert-status-label {
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 12px;
    font-weight: 800;
    color: currentColor;
    opacity: 0.78;
  }

  .alert-status-card strong {
    font-size: 18px;
    line-height: 1.4;
  }

  .alert-status-copy,
  .result-note {
    line-height: 1.65;
  }

  .summary-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .staff-link-card {
    border-radius: 18px;
    border: 1px solid rgba(22, 48, 56, 0.1);
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(245, 255, 248, 0.84));
    padding: 16px;
    display: grid;
    gap: 10px;
  }

  .dashboard-link-button,
  .ghost-link-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 12px 16px;
    border-radius: 18px;
    text-decoration: none;
    font-weight: 800;
    transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
  }

  .dashboard-link-button:hover,
  .ghost-link-button:hover {
    transform: translateY(-1px);
  }

  .dashboard-link-button {
    border: 2px solid rgba(93, 141, 255, 0.35);
    color: #3150d5;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(236, 245, 255, 0.92));
    box-shadow: 0 12px 24px rgba(93, 141, 255, 0.12);
  }

  .ghost-link-button {
    border: 1px solid rgba(22, 48, 56, 0.12);
    color: var(--text);
    background: rgba(255, 255, 255, 0.82);
  }

  .staff-link-copy {
    color: var(--muted);
    line-height: 1.6;
  }

  .primary-button,
  .ghost-button {
    appearance: none;
    border-radius: 16px;
    padding: 14px 16px;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
  }

  .primary-button {
    border: 1px solid rgba(14, 142, 138, 0.2);
    background: linear-gradient(135deg, #0e8e8a, #146e8b);
    color: #fffdf9;
    box-shadow: 0 16px 28px rgba(20, 110, 139, 0.18);
  }

  .ghost-button {
    border: 1px solid rgba(22, 48, 56, 0.12);
    background: rgba(255, 255, 255, 0.82);
    color: var(--text);
  }

  .result-box {
    border-radius: 20px;
    border: 1px solid rgba(14, 142, 138, 0.18);
    background: linear-gradient(180deg, rgba(14, 142, 138, 0.1), rgba(20, 110, 139, 0.06));
    padding: 18px;
    display: grid;
    gap: 10px;
  }

  .result-box.hidden,
  .banner.hidden,
  .hidden {
    display: none;
  }

  .result-box strong {
    font-size: 18px;
  }

  .result-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .mini-chip {
    border-radius: 999px;
    padding: 6px 10px;
    border: 1px solid rgba(22, 48, 56, 0.12);
    background: rgba(255, 255, 255, 0.84);
    font-size: 13px;
  }

  .banner {
    border-radius: 18px;
    padding: 14px 16px;
    border: 1px solid rgba(14, 142, 138, 0.18);
    background: rgba(255, 255, 255, 0.88);
    box-shadow: var(--shadow);
  }

  .banner.error {
    border-color: rgba(165, 45, 81, 0.26);
    background: rgba(255, 238, 242, 0.96);
    color: #842545;
  }

  .note-list {
    margin: 0;
    padding-left: 18px;
    display: grid;
    gap: 10px;
    color: var(--muted);
    line-height: 1.6;
  }

  .empty-line {
    color: var(--muted);
  }

  .urgency-stable {
    background: var(--stable-bg);
    color: var(--stable-text);
    border-color: #b8e8d3;
  }

  .urgency-watch {
    background: var(--watch-bg);
    color: var(--watch-text);
    border-color: #e8d98b;
  }

  .urgency-urgent {
    background: var(--urgent-bg);
    color: var(--urgent-text);
    border-color: #ebcc90;
  }

  .urgency-critical {
    background: var(--critical-bg);
    color: var(--critical-text);
    border-color: #efbcc9;
  }

  .alert-state-idle {
    background: var(--stable-bg);
    color: var(--stable-text);
    border-color: #b8e8d3;
  }

  .alert-state-preview,
  .alert-state-disabled {
    background: var(--urgent-bg);
    color: var(--urgent-text);
    border-color: #ebcc90;
  }

  .alert-state-sent {
    background: var(--info-bg);
    color: var(--info-text);
    border-color: #bdd5ec;
  }

  .alert-state-failed {
    background: var(--critical-bg);
    color: var(--critical-text);
    border-color: #efbcc9;
  }

  .dashboard-body {
    background:
      linear-gradient(120deg, rgba(255, 236, 240, 0.52), transparent 35%),
      linear-gradient(240deg, rgba(204, 255, 232, 0.45), transparent 40%),
      linear-gradient(180deg, #fffdf7 0%, #f7fff7 50%, #f7fbff 100%);
  }

  .dashboard-hero {
    display: grid;
    grid-template-columns: minmax(0, 1.5fr) minmax(260px, 340px);
    gap: 20px;
    max-width: 1380px;
    margin: 0 auto 20px;
    align-items: center;
  }

  .dashboard-hero-copy,
  .dashboard-hero-actions {
    display: grid;
    gap: 12px;
  }

  .dashboard-subtitle,
  .dashboard-generated-at {
    color: var(--muted);
    line-height: 1.6;
  }

  .dashboard-shell {
    display: grid;
    gap: 20px;
    max-width: 1380px;
    margin: 0 auto;
  }

  .dashboard-stats-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .dashboard-stat-card {
    border-radius: 20px;
    padding: 18px;
    border: 1px solid rgba(22, 48, 56, 0.08);
    background: rgba(255, 255, 255, 0.86);
    display: grid;
    gap: 8px;
  }

  .dashboard-stat-card span {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dashboard-stat-card strong {
    font-size: 34px;
    line-height: 1;
  }

  .dashboard-stat-mint {
    box-shadow: inset 0 4px 0 rgba(85, 216, 193, 0.9);
  }

  .dashboard-stat-sky {
    box-shadow: inset 0 4px 0 rgba(83, 209, 255, 0.9);
  }

  .dashboard-stat-sunset {
    box-shadow: inset 0 4px 0 rgba(255, 140, 90, 0.9);
  }

  .dashboard-stat-rose,
  .dashboard-stat-urgent {
    box-shadow: inset 0 4px 0 rgba(255, 124, 136, 0.9);
  }

  .dashboard-stat-watch {
    box-shadow: inset 0 4px 0 rgba(255, 203, 98, 0.9);
  }

  .dashboard-stat-stable {
    box-shadow: inset 0 4px 0 rgba(123, 224, 171, 0.9);
  }

  .dashboard-stat-info {
    box-shadow: inset 0 4px 0 rgba(93, 141, 255, 0.9);
  }

  .dashboard-board {
    display: grid;
    grid-template-columns: repeat(5, minmax(240px, 1fr));
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .dashboard-column {
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(22, 48, 56, 0.08);
    padding: 16px;
    display: grid;
    gap: 14px;
    min-height: 100%;
  }

  .dashboard-column-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: start;
  }

  .dashboard-column-head strong {
    display: block;
    font-size: 18px;
    margin-bottom: 4px;
  }
