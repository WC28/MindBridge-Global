<style>
  :root {
    --bg: #edf4fb;
    --bg-soft: #dfeaf4;
    --panel: rgba(255, 255, 255, 0.88);
    --panel-soft: rgba(246, 250, 255, 0.9);
    --border: #c9d7e6;
    --border-strong: #aebfd3;
    --text: #0f2431;
    --muted: #5d7387;
    --sidebar: #07131c;
    --sidebar-border: #163041;
    --sidebar-text: #ecf7ff;
    --accent: #10c7aa;
    --accent-strong: #099b86;
    --accent-blue: #3e74ff;
    --accent-violet: #7b61ff;
    --accent-coral: #ff6d7c;
    --success-bg: #dff6ef;
    --success-text: #11624f;
    --warning-bg: #fff1d6;
    --warning-text: #8a5b0f;
    --danger-bg: #fde1e6;
    --danger-text: #8a2443;
    --info-bg: #e5efff;
    --info-text: #234e9d;
    --shadow: 0 22px 50px rgba(18, 38, 58, 0.12);
    --radius: 8px;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    background:
      linear-gradient(180deg, #091720 0, #0d1f2c 240px, var(--bg) 240px, var(--bg) 100%);
  }

  body::before,
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  body::before {
    background:
      linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.85), transparent 72%);
  }

  body::after {
    background: linear-gradient(115deg, transparent 0%, rgba(62, 116, 255, 0.08) 38%, rgba(16, 199, 170, 0.08) 52%, transparent 78%);
    transform: translateX(-35%);
    animation: ambientSweep 14s linear infinite;
  }

  h1,
  h2,
  h3,
  p {
    margin: 0;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  a {
    color: inherit;
  }

  .hidden {
    display: none !important;
  }

  .auth-shell {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 28px 18px;
  }

  .auth-card {
    width: min(1120px, 100%);
    display: grid;
    gap: 22px;
    padding: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
    position: relative;
    z-index: 1;
  }

  .auth-brand,
  .brand-block {
    display: grid;
    gap: 8px;
  }

  .auth-section {
    display: grid;
    gap: 14px;
  }

  .eyebrow,
  .topbar-label,
  .field-help,
  .callout-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0;
    color: var(--muted);
  }

  #auth-app-title,
  #app-title {
    font-size: 30px;
    line-height: 1.15;
  }

  #auth-app-subtitle,
  #app-subtitle {
    color: var(--muted);
    line-height: 1.55;
  }

  .portal-picker {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .portal-card,
  .nav-button {
    appearance: none;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel-soft);
    text-align: left;
    padding: 14px;
    color: var(--text);
    cursor: pointer;
    display: grid;
    gap: 6px;
    transition: border-color 180ms ease, transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
  }

  .portal-card:hover,
  .portal-card:focus-visible,
  .nav-button:hover,
  .nav-button:focus-visible {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 10px 24px rgba(12, 157, 140, 0.08);
    outline: none;
  }

  .portal-card.active {
    background: linear-gradient(180deg, rgba(16, 199, 170, 0.13), rgba(62, 116, 255, 0.08));
    border-color: var(--accent);
    box-shadow: 0 10px 24px rgba(12, 157, 140, 0.1);
  }

  .portal-card-title,
  .nav-button-title {
    font-weight: 700;
  }

  .portal-card-subtitle,
  .nav-button-subtitle {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.4;
  }

  .login-panel,
  .panel,
  .form-shell,
  .summary-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
  }

  .login-panel,
  .panel,
  .form-shell {
    padding: 22px;
  }

  .panel-header {
    margin-bottom: 16px;
  }

  .panel-header p,
  .form-shell p {
    color: var(--muted);
    line-height: 1.55;
    margin-top: 8px;
  }

  .login-form,
  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .field {
    display: grid;
    gap: 8px;
  }

  .field.span-2 {
    grid-column: span 2;
  }

  .field label {
    font-weight: 600;
  }

  .field-help {
    line-height: 1.4;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    padding: 11px 12px;
    border-radius: 6px;
    border: 1px solid var(--border-strong);
    background: #ffffff;
    color: var(--text);
  }

  .field textarea {
    min-height: 104px;
    resize: vertical;
  }

  .field input:focus-visible,
  .field select:focus-visible,
  .field textarea:focus-visible,
  .portal-card:focus-visible,
  .nav-button:focus-visible,
  .ghost-button:focus-visible,
  .primary-button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .portal-summary,
  .status-pill,
  .user-chip {
    min-height: 36px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid #cde1e5;
    background: #eff7f8;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
  }

  .portal-summary {
    margin-top: 12px;
    line-height: 1.45;
  }

  .form-footer {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .button-group,
  .topbar-user-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .ghost-button,
  .primary-button {
    border-radius: 6px;
    padding: 11px 14px;
    cursor: pointer;
    border: 1px solid transparent;
    min-height: 42px;
  }

  .ghost-button {
    background: transparent;
    border-color: var(--border-strong);
    color: var(--text);
  }

  .sidebar-button {
    color: var(--sidebar-text);
    border-color: rgba(237, 247, 248, 0.18);
  }

  .primary-button {
    background: var(--accent);
    color: #ffffff;
  }

  .primary-button:hover,
  .primary-button:focus-visible {
    background: var(--accent-strong);
  }

  .banner {
    min-height: 42px;
    padding: 10px 14px;
    border-radius: var(--radius);
    background: var(--success-bg);
    color: var(--success-text);
    border: 1px solid #bfe6db;
    line-height: 1.45;
  }

  .banner.error {
    background: var(--danger-bg);
    color: var(--danger-text);
    border-color: #f0b9c7;
  }

  .shell {
    display: grid;
    grid-template-columns: 310px minmax(0, 1fr);
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  .sidebar {
    padding: 28px 22px;
    border-right: 1px solid var(--sidebar-border);
    background:
      linear-gradient(180deg, rgba(8, 22, 31, 0.96), rgba(8, 22, 31, 0.88)),
      linear-gradient(135deg, rgba(16, 199, 170, 0.06), rgba(123, 97, 255, 0.08));
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
  }

  .sidebar .eyebrow,
  .sidebar #app-subtitle,
  .sidebar .nav-button-subtitle,
  .sidebar .user-chip {
    color: rgba(237, 247, 248, 0.78);
  }

  .sidebar .user-chip {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.08);
  }

  .nav-list,
  .sidebar-actions {
    display: grid;
    gap: 8px;
  }

  .nav-section {
    display: grid;
    gap: 8px;
  }

  .nav-section-label {
    padding: 10px 12px 2px;
    color: rgba(236, 247, 255, 0.58);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .nav-button {
    background: transparent;
    border-color: rgba(237, 247, 248, 0.08);
    color: var(--sidebar-text);
  }

  .nav-button:hover,
  .nav-button:focus-visible {
    border-color: rgba(12, 157, 140, 0.75);
    background: rgba(255, 255, 255, 0.04);
  }

  .nav-button.active {
    background: linear-gradient(135deg, rgba(16, 199, 170, 0.2), rgba(62, 116, 255, 0.18));
    border-color: rgba(62, 116, 255, 0.72);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .sidebar-actions {
    margin-top: auto;
  }

  .main-panel {
    padding: 26px 30px 42px;
    display: grid;
    gap: 22px;
    position: relative;
  }

  .topbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .topbar-value {
    margin-top: 4px;
    font-size: 15px;
    color: var(--muted);
  }

  .topbar-actions {
    display: grid;
    gap: 10px;
    justify-items: end;
  }

  .page {
    display: none;
    gap: 22px;
  }

  .page.active {
    display: grid;
  }

  #dynamic-pages {
    display: grid;
    gap: 22px;
  }

  .page-header {
    display: grid;
    gap: 16px;
    grid-template-columns: minmax(0, 1fr) 360px;
    align-items: start;
  }

  .page-header p {
    color: var(--muted);
    line-height: 1.55;
    margin-top: 8px;
  }

  .sheet-link-wrap a {
    color: var(--accent-strong);
    font-weight: 700;
  }

  .callout {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .callout p {
    margin-top: 8px;
    color: var(--text);
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 14px;
  }

  .summary-card {
    padding: 18px;
    display: grid;
    gap: 10px;
    min-height: 116px;
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    background: var(--accent);
  }

  .summary-card::after {
    content: '';
    position: absolute;
    inset: auto -20% -45% auto;
    width: 160px;
    height: 160px;
    background: linear-gradient(180deg, rgba(62, 116, 255, 0.12), rgba(16, 199, 170, 0.04));
    transform: rotate(32deg);
  }

  .summary-card.tone-red::before {
    background: #d63d67;
  }

  .summary-card.tone-orange::before {
    background: #d38917;
  }

  .summary-card.tone-yellow::before {
    background: #c5a11d;
  }

  .summary-card.tone-blue::before {
    background: var(--accent-blue);
  }

  .summary-card.tone-violet::before {
    background: var(--accent-violet);
  }

  .summary-card.tone-teal::before {
    background: var(--accent);
  }

  .summary-card-label {
    color: var(--muted);
    font-size: 14px;
  }

  .summary-card-value {
    font-size: 34px;
    font-weight: 700;
  }

  .dashboard-grid {
    display: grid;
    gap: 16px;
  }

  .dashboard-grid-3 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .dashboard-grid-2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .bars-list {
    display: grid;
    gap: 14px;
  }

  .bar-row {
    display: grid;
    gap: 8px;
  }

  .bar-meta {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    font-size: 14px;
  }

  .bar-track {
    width: 100%;
    height: 10px;
    border-radius: 999px;
    background: var(--bg-soft);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-blue));
    transition: width 380ms ease;
  }

  .metric-list {
    display: grid;
    gap: 12px;
  }

  .metric-list.compact {
    gap: 10px;
  }

  .metric-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--panel-soft);
  }

  .metric-row-stack {
    align-items: flex-start;
    flex-direction: column;
  }

  .metric-note {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
  }

  .subpanel-header {
    margin-top: 18px;
    margin-bottom: 10px;
  }

  .subpanel-header h4 {
    margin: 0;
    font-size: 14px;
  }

  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .tag {
    border-radius: 999px;
    padding: 9px 12px;
    background: #eff7f8;
    border: 1px solid #cfe3e7;
    display: inline-flex;
    gap: 8px;
    align-items: center;
    line-height: 1.25;
  }

  .tag-count {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 12px;
  }

  .table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  tbody tr {
    transition: background 160ms ease;
  }

  tbody tr:hover {
    background: rgba(62, 116, 255, 0.04);
  }

  th,
  td {
    text-align: left;
    padding: 12px 10px;
    border-bottom: 1px solid #e3ecef;
    vertical-align: top;
    font-size: 14px;
    line-height: 1.45;
  }

  th {
    color: var(--muted);
    font-weight: 600;
  }

  .flag,
  .priority-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 72px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid transparent;
    font-weight: 700;
    font-size: 13px;
  }

  .flag-red {
    background: var(--danger-bg);
    color: var(--danger-text);
    border-color: #efb5c4;
  }

  .flag-orange {
    background: var(--warning-bg);
    color: var(--warning-text);
    border-color: #f0d39a;
  }

  .flag-yellow {
    background: #fff8d7;
    color: #7d6812;
    border-color: #eadb8f;
  }

  .flag-green {
    background: var(--success-bg);
    color: var(--success-text);
    border-color: #bde7d9;
  }

  .priority-immediate {
    background: var(--danger-bg);
    color: var(--danger-text);
    border-color: #efb5c4;
  }

  .priority-priority {
    background: var(--warning-bg);
    color: var(--warning-text);
    border-color: #f0d39a;
  }

  .priority-routine {
    background: var(--info-bg);
    color: var(--info-text);
    border-color: #c4d8ff;
  }

  .inline-flag-text {
    margin-left: 10px;
    color: var(--muted);
  }

  .result-box {
    margin-top: 16px;
    padding: 14px;
    border-radius: 6px;
    border: 1px solid #cfe3e7;
    background: #eff7f8;
    display: grid;
    gap: 12px;
  }

  .result-title {
    font-weight: 700;
  }

  .result-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .mini-chip {
    padding: 6px 10px;
    border-radius: 999px;
    background: #ffffff;
    border: 1px solid var(--border);
    font-size: 13px;
  }

  .code-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .code-chip {
    padding: 12px;
    border-radius: 6px;
    background: #ffffff;
    border: 1px solid var(--border);
    display: grid;
    gap: 6px;
  }

  .code-chip span {
    color: var(--muted);
    font-size: 12px;
  }

  .code-chip strong {
    font-size: 18px;
  }

  .result-text {
    line-height: 1.5;
  }

  .empty-state {
    color: var(--muted);
    line-height: 1.55;
  }

  .experience-hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    padding: 24px;
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: var(--radius);
    background:
      linear-gradient(135deg, rgba(7, 19, 28, 0.92), rgba(18, 41, 59, 0.88)),
      linear-gradient(120deg, rgba(16, 199, 170, 0.12), rgba(123, 97, 255, 0.12));
    color: #f2fbff;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .experience-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.06) 46%, transparent 64%);
    transform: translateX(-55%);
    animation: heroSweep 8s ease-in-out infinite;
  }

  .experience-hero.compact {
    padding: 20px 24px;
  }

  .experience-copy {
    display: grid;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .experience-copy p {
    color: rgba(242, 251, 255, 0.8);
    line-height: 1.6;
  }

  .hero-status-stack,
  .hero-action-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-start;
    justify-content: flex-end;
    position: relative;
    z-index: 1;
  }

  .hero-status-tile {
    min-width: 150px;
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.06);
    display: grid;
    gap: 6px;
  }

  .hero-status-tile span {
    color: rgba(242, 251, 255, 0.68);
    font-size: 12px;
    text-transform: uppercase;
  }

  .hero-status-tile strong {
    font-size: 18px;
    font-weight: 700;
  }

  .panel-accent {
    position: relative;
    overflow: hidden;
  }

  .panel-accent::before {
    content: '';
    position: absolute;
    inset: 0 0 auto 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-blue));
  }

  .panel-blue::before {
    background: linear-gradient(90deg, var(--accent-blue), #79a2ff);
  }

  .panel-violet::before {
    background: linear-gradient(90deg, var(--accent-violet), #ae88ff);
  }

  .panel-red::before {
    background: linear-gradient(90deg, var(--accent-coral), #ff8aa6);
  }

  .panel-teal::before {
    background: linear-gradient(90deg, var(--accent), #60e6d2);
  }

  .spotlight-stack,
  .spotlight-grid,
  .loop-card-grid {
    display: grid;
    gap: 12px;
  }

  .spotlight-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .ecosystem-layer-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .spotlight-card,
  .loop-card,
  .workspace-case-card,
  .workspace-signal-card {
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-soft);
    padding: 14px;
    display: grid;
    gap: 8px;
    transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
  }

  .spotlight-card:hover,
  .loop-card:hover,
  .workspace-case-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 18px 36px rgba(17, 36, 56, 0.08);
    border-color: rgba(62, 116, 255, 0.28);
  }

  .spotlight-top,
  .loop-card-top,
  .workspace-case-top,
  .timeline-title-row,
  .workspace-detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .spotlight-stage,
  .loop-card-partner,
  .workspace-case-stage {
    font-weight: 700;
  }

  .spotlight-text,
  .loop-card-text,
  .workspace-case-meta,
  .timeline-text {
    color: var(--muted);
    line-height: 1.55;
  }

  .spotlight-meta,
  .loop-card-footer {
    color: var(--muted);
    font-size: 13px;
  }

  .loop-card-status-row,
  .workspace-chip-row,
  .quick-action-row {
    display: flex;
